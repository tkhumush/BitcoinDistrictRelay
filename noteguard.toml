# BitcoinDistrictRelay — Noteguard Whitelist Configuration
#
# Only pubkeys listed here can publish events to the relay.
# All other events will be rejected by the write policy plugin.
#
# To add a new member:
# 1. Get their npub (Nostr public key)
# 2. Convert to hex format (64 characters) using: nak decode npub1... 
# 3. Add the hex pubkey below with a comment
# 4. Restart the relay: docker compose restart nostr-relay

pipeline = ["whitelist"]

[filters.whitelist]
pubkeys = [
    "9cb3545c36940d9a2ef86d50d5c7a8fab90310cc898c4344bcfc4c822ff47bca",  # tkay (admin)
    "812cff5afa5d9c3b4082b82c70365cfd2d279c27aa912313b8fcbfd65c40aeeb",  # bitcoindistrict
    "f9fc3e560de034a66b8dab4dabe7bced13435293b363cb979a1933f82299f805",  # AlexBarq
    # TODO: Add Bitcoin District community members here
]

# Optionally whitelist local IP
# Rate limiter - optional, limits notes per pubkey
# Uncomment to enable rate limiting
# [filters.ratelimit]
# max_notes_per_minute = 10
# max_notes_per_hour = 100

# Kind filter - optional, restrict which event kinds are allowed
# Uncomment to enable kind filtering
# [filters.kind_whitelist]
# kinds = [0, 1, 3, 4, 5, 6, 7]  # Allow only certain event kinds

# Content filter - optional, reject notes with blocked words
# Uncomment to enable content filtering
# [filters.content_filter]
# blocked_words = ["spam", "scam"]